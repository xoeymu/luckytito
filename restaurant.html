<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Tito Restaurant 点餐系统 Ordering System</title>
<style>
:root{
  --navy:#0b3d5e; --navy-dk:#082a42; --blue:#0284c7; --slate:#475569; --slate-lt:#94a3b8;
  --bg:#f1f5f9; --card:#ffffff; --border:#e2e8f0; --green:#16a34a; --orange:#ea580c; --red:#dc2626;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:#1e293b}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:50}
header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.3px}
header .clock{margin-left:auto;font-size:13px;color:#cbd5e1}
header button{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;font-weight:600}
header button:hover{background:rgba(255,255,255,.22)}
.layout{display:flex;gap:12px;padding:12px;height:calc(100vh - 56px)}
.panel{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px;color:var(--navy);display:flex;align-items:center;gap:8px}
.panel-body{flex:1;overflow-y:auto;padding:10px}
#tables-panel{width:230px;flex-shrink:0}
#order-panel{width:340px;flex-shrink:0}
#menu-panel{flex:1;min-width:0}
.btn{border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:var(--bg);color:var(--slate)}
.btn-danger{background:#fee2e2;color:var(--red)}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-block{width:100%}
.table-tile{border:1.5px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;position:relative}
.table-tile.active{border-color:var(--blue);background:#eff6ff}
.table-tile.has-order{border-color:#fed7aa;background:#fff7ed}
.table-tile.active.has-order{border-color:var(--blue);background:#eff6ff}
.table-tile .t-name{font-weight:800;font-size:14px;color:var(--navy)}
.table-tile .t-note{font-size:11px;color:var(--slate-lt);margin-top:1px}
.table-tile .t-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--slate)}
.table-tile .t-del{position:absolute;top:6px;right:6px;font-size:11px;color:var(--slate-lt);background:none;border:none;cursor:pointer;padding:2px 5px}
.table-tile .t-del:hover{color:var(--red)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--border)}
.cat-tab{padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:700;background:var(--bg);color:var(--slate);cursor:pointer;border:1.5px solid transparent;white-space:nowrap}
.cat-tab.active{background:var(--navy);color:#fff}
.search-row{padding:10px 12px;border-bottom:1px solid var(--border)}
.search-row input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding:4px}
.item-card{border:1.5px solid var(--border);border-radius:10px;padding:9px 10px;cursor:pointer;background:#fff;position:relative}
.item-card:hover{border-color:var(--blue);background:#f0f9ff}
.item-card .ic-code{font-size:10.5px;color:var(--slate-lt);font-weight:700}
.item-card .ic-hot{position:absolute;top:7px;right:8px;font-size:13px}
.item-card .ic-name{font-size:13px;font-weight:700;color:#1e293b;margin-top:2px;line-height:1.3}
.item-card .ic-en{font-size:10.5px;color:var(--slate-lt);margin-top:1px;line-height:1.25}
.item-card .ic-price{font-size:13px;font-weight:800;color:var(--blue);margin-top:6px}
.item-card .ic-price input{width:64px;padding:2px 4px;border:1.5px solid var(--blue);border-radius:5px;font-size:12px;font-weight:800;color:var(--blue)}
.order-table-name{padding:10px 14px;border-bottom:1px solid var(--border)}
.order-table-name .tn-label{font-weight:800;font-size:15px;color:var(--navy)}
.order-table-name .tn-note{font-size:12px;color:var(--slate-lt);margin-top:2px}
.order-table-name .tn-edit{font-size:11px;color:var(--blue);cursor:pointer;margin-left:6px}
.order-line{display:flex;align-items:center;gap:6px;padding:8px 4px;border-bottom:1px solid #f1f5f9}
.order-line .ol-info{flex:1;min-width:0}
.order-line .ol-name{font-size:12.5px;font-weight:700;color:#1e293b}
.order-line .ol-price{font-size:11px;color:var(--slate-lt)}
.order-line .ol-en{font-size:10px;color:var(--slate-lt)}
.order-line .ol-qty{display:flex;align-items:center;gap:4px}
.order-line .ol-qty button{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:13px;line-height:1}
.order-line .ol-sub{font-size:13px;font-weight:800;color:var(--navy);width:62px;text-align:right}
.order-line .ol-del{color:var(--slate-lt);cursor:pointer;font-size:13px;padding:2px 4px}
.order-line .ol-del:hover{color:var(--red)}
.order-empty{padding:40px 16px;text-align:center;color:var(--slate-lt);font-size:13px}
.order-footer{border-top:1.5px solid var(--border);padding:12px 14px}
.order-total{display:flex;justify-content:space-between;font-size:17px;font-weight:800;color:var(--navy);margin-bottom:10px}
.order-actions{display:flex;gap:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-box h3{margin:0 0 14px;font-size:15px;color:var(--navy)}
.modal-box label{display:block;font-size:12px;color:var(--slate);margin:10px 0 4px;font-weight:700}
.modal-box input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.hist-row{display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px solid #f1f5f9;font-size:13px}
.hist-row .h-meta{color:var(--slate-lt);font-size:11px}
.hist-total-bar{background:var(--bg);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;font-weight:800;color:var(--navy);margin-bottom:10px}
.receipt-print{display:none}
.kitchen-print{display:none}
@media print{
  /* Printer is a 58mm-roll thermal unit with a 48mm printable area (confirmed from the
     driver's paper-size options, which only ever list 58(48)) — NOT 80mm. The box width
     below is set to the full 58mm roll, with 5mm side padding eating into the non-printable
     margins so the actual content area lands on 48mm, matching the hardware. */
  @page{size:58mm auto;margin:0}
  html,body{width:58mm;margin:0;padding:0}
  body *{visibility:hidden}
  .receipt-print, .receipt-print *{visibility:visible}
  .receipt-print{display:block;position:absolute;left:0;top:0;width:58mm;padding:3mm 5mm;font-family:'Courier New',monospace;color:#000;font-size:15px;box-sizing:border-box}
  .receipt-print .r-title{text-align:center;font-weight:800;font-size:17px;margin-bottom:2mm}
  .receipt-print .r-sub{text-align:center;font-size:12px;margin-bottom:2mm}
  .receipt-print hr{border:none;border-top:1px dashed #000;margin:2mm 0}
  .receipt-print .r-line{margin:2mm 0}
  .receipt-print .r-line .rl-name{font-weight:700}
  .receipt-print .r-line .rl-en{font-size:.85em;margin-top:.5mm}
  .receipt-print .r-line .rl-qp{display:flex;justify-content:space-between;margin-top:1mm}
  .receipt-print .r-total{display:flex;justify-content:space-between;font-weight:800;font-size:18px;margin-top:2mm}
  .receipt-print .r-pay{text-align:center;font-weight:800;font-size:15px;margin-top:2mm;border:1px solid #000;padding:1.5mm}
  .receipt-print .r-sign{margin-top:8mm;text-align:left}
  .receipt-print .r-sign-line{border-top:1px solid #000;margin-bottom:1mm;width:55%}
  .receipt-print .r-sign-label{text-align:left;font-size:12px}
  .receipt-print .r-foot{text-align:center;font-size:13px;margin-top:3mm}
  body.print-kitchen .receipt-print{display:none!important}
  body:not(.print-kitchen) .kitchen-print{display:none!important}
  .kitchen-print, .kitchen-print *{visibility:visible}
  .kitchen-print{display:block;position:absolute;left:0;top:0;width:58mm;padding:3mm 5mm;font-family:'Courier New',monospace;color:#000;font-size:22px;box-sizing:border-box}
  .kitchen-print .k-title{text-align:center;font-weight:800;font-size:32px;margin-bottom:2mm}
  .kitchen-print .k-sub{text-align:center;font-size:22px;margin-bottom:1mm}
  .kitchen-print hr{border:none;border-top:1px dashed #000;margin:2mm 0}
  .kitchen-print .k-line{display:flex;gap:5px;margin:1.8mm 0;font-size:28px;font-weight:700}
  .kitchen-print .kl-code{width:52px;flex-shrink:0}
  .kitchen-print .kl-name{flex:1}
  .kitchen-print .kl-qty{flex-shrink:0}
}
.mobile-tabbar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:60;padding:4px 4px calc(4px + env(safe-area-inset-bottom,0px))}
.mobile-tabbar button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--slate);padding:6px 0;position:relative;font-weight:700;cursor:pointer}
.mobile-tabbar button .mt-icon{font-size:18px}
.mobile-tabbar button.active{color:var(--blue)}
.mobile-tabbar .mt-badge{position:absolute;top:0;right:22%;background:var(--red);color:#fff;border-radius:10px;min-width:16px;height:16px;font-size:10px;line-height:16px;text-align:center;padding:0 3px}
.pending-banner{display:none;position:fixed;top:56px;left:0;right:0;z-index:55;align-items:center;justify-content:space-between;gap:10px;background:var(--orange);color:#fff;padding:10px 16px;cursor:pointer;font-weight:800;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.2);animation:pb-pulse 1.6s ease-in-out infinite}
.pending-banner .pb-action{font-weight:700;font-size:12px;opacity:.9;white-space:nowrap}
@keyframes pb-pulse{0%,100%{background:var(--orange)}50%{background:#dc2626}}
@media (max-width:768px){
  .layout{flex-direction:column;padding:8px;gap:0;height:calc(100vh - 56px);padding-bottom:58px}
  .panel{display:none;width:100%!important;flex:1 1 auto!important}
  .panel.mobile-active{display:flex}
  .mobile-tabbar{display:flex}
  .order-line .ol-qty button{width:34px;height:34px;font-size:16px}
  .order-line .ol-qty span{min-width:18px;text-align:center;font-size:14px}
  .item-card{padding:12px 10px}
  .order-actions{flex-wrap:wrap}
  .order-actions .btn{font-size:12px;padding:9px 6px}
}
</style>
</head>
<body>

<header>
  <h1>🍽️ Lucky Tito Restaurant 点餐结账</h1>
  <button onclick="showHistory()">📊 今日流水 Today's Sales</button>
  <button onclick="setSyncUrl()" id="sync-btn">🔗 云同步 Cloud Sync</button>
  <span class="clock" id="clock"></span>
</header>

<div class="pending-banner" id="pending-banner" onclick="checkPhoneOrders()">
  <span id="pending-banner-text"></span>
  <span class="pb-action">点击立即接单 Tap to claim now ›</span>
</div>

<div class="layout">
  <div class="panel" id="tables-panel">
    <div class="panel-header">🪑 桌台 Tables<button class="btn btn-ghost btn-sm" id="phone-orders-btn" style="margin-left:auto" onclick="checkPhoneOrders()">📥 手机来单 Phone Orders</button><button class="btn btn-primary btn-sm" onclick="openNewTableModal()">＋ 开台 New Table</button></div>
    <div class="panel-body" id="tables-list"></div>
  </div>

  <div class="panel" id="menu-panel">
    <div class="search-row"><input type="text" id="search-input" placeholder="🔍 搜索编号/菜名 Search code or name..." oninput="renderMenu()"></div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="panel-body"><div class="menu-grid" id="menu-grid"></div></div>
  </div>

  <div class="panel" id="order-panel">
    <div class="order-table-name" id="order-table-name"></div>
    <div class="panel-body" id="order-lines" style="padding:0 10px"></div>
    <div class="order-footer">
      <button class="btn btn-ghost btn-block" id="upload-btn" style="margin-bottom:10px" onclick="uploadOrderToFrontDesk()">📤 上传到前台 Upload to Front Desk</button>
      <div class="order-total"><span>总计 Total</span><span id="order-total-amt">₱0</span></div>
      <div class="order-actions">
        <button class="btn btn-ghost" style="flex:1" onclick="clearOrder()">🗑 清空 Clear</button>
        <button class="btn btn-primary" style="flex:1" onclick="printKitchenTicket()">🍳 厨房单 Kitchen</button>
        <button class="btn btn-green" style="flex:2" onclick="checkoutTable()">🖨️ 结账打印 Checkout & Print</button>
      </div>
    </div>
  </div>
</div>

<div class="mobile-tabbar" id="mobile-tabbar">
  <button onclick="setMobileView('tables')" data-v="tables"><span class="mt-icon">🪑</span><span>桌台</span></button>
  <button onclick="setMobileView('menu')" data-v="menu"><span class="mt-icon">🍽️</span><span>菜单</span></button>
  <button onclick="setMobileView('order')" data-v="order"><span class="mt-icon">🧾</span><span>订单</span><span class="mt-badge" id="mt-order-badge" style="display:none">0</span></button>
</div>

<!-- NEW TABLE MODAL -->
<div class="modal-overlay" id="new-table-modal">
  <div class="modal-box">
    <h3>开台 New Table</h3>
    <label>桌号/名称 Table Name</label>
    <input type="text" id="nt-label" placeholder="例如：3号桌 / 外带1 e.g. Table 3 / Takeout 1">
    <label>备注 Note（可选，如客人姓名/房号，方便前台核对 Optional — guest name/room no.）</label>
    <input type="text" id="nt-note" placeholder="例如：Dani Room 12">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('new-table-modal')">取消 Cancel</button>
      <button class="btn btn-primary" onclick="confirmNewTable()">确认开台 Confirm</button>
    </div>
  </div>
</div>

<!-- EDIT TABLE MODAL -->
<div class="modal-overlay" id="edit-table-modal">
  <div class="modal-box">
    <h3>编辑桌台 Edit Table</h3>
    <label>桌号/名称 Table Name</label>
    <input type="text" id="et-label">
    <label>备注 Note</label>
    <input type="text" id="et-note">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('edit-table-modal')">取消 Cancel</button>
      <button class="btn btn-primary" onclick="confirmEditTable()">保存 Save</button>
    </div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="checkout-modal">
  <div class="modal-box">
    <h3>结账确认 Confirm Checkout</h3>
    <div style="background:var(--bg);border-radius:8px;padding:10px 12px">
      <div style="font-weight:800;color:var(--navy)" id="co-table-label"></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--navy);margin-top:6px"><span>小计 Subtotal</span><span id="co-subtotal"></span></div>
      <div id="co-disc-row" style="display:none;justify-content:space-between;font-size:14px;color:#059669;font-weight:700;margin-top:2px"><span>教练折扣 Inst. Discount (-10%)</span><span id="co-disc-amt"></span></div>
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--navy);margin-top:6px;padding-top:6px;border-top:1px dashed #cbd5e1"><span>总计 Total</span><span id="co-total"></span></div>
    </div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:10px;font-size:14px;font-weight:700;color:var(--navy)">
      <input type="checkbox" id="co-inst-disc" onchange="toggleInstDiscount(this.checked)" style="width:18px;height:18px;cursor:pointer">
      🎓 教练折扣 Inst. Discount (-10%)
    </label>
    <label>付款方式 Payment Method</label>
    <div class="order-actions">
      <button class="btn btn-primary" style="flex:1" id="co-btn-cash" onclick="setCheckoutRoomCharge(false)">💰 现金/卡 Cash/Card</button>
      <button class="btn btn-ghost" style="flex:1" id="co-btn-room" onclick="setCheckoutRoomCharge(true)">🛏️ 房间挂账 Room Charge</button>
    </div>
    <div id="co-room-no-wrap" style="display:none">
      <label>房号 Room Number</label>
      <input type="text" id="co-room-no" placeholder="例如：12 / Villa 3">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('checkout-modal')">取消 Cancel</button>
      <button class="btn btn-green" onclick="confirmCheckout()">🖨️ 确认结账 Confirm & Print</button>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="history-modal">
  <div class="modal-box" style="max-width:560px">
    <h3>📊 今日流水 Today's Sales</h3>
    <div class="hist-total-bar"><span id="hist-date"></span><span id="hist-total"></span></div>
    <div id="hist-list"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('history-modal')">关闭 Close</button>
    </div>
  </div>
</div>

<div class="receipt-print" id="receipt-print"></div>
<div class="kitchen-print" id="kitchen-print"></div>

<script>
// ====================================================================
//   MENU DATA — extracted from Lucky Tito restaurant menu photos
//   Prices in ₱ (PHP). hot:true = 👍 chef recommendation marker.
//   NOTE: two photographed versions of the Rice Bowl/Noodle page had
//   conflicting prices for M6/M7/M9/M12 (and M8 was missing from one
//   version). The more complete version is used below — confirm with
//   Dani that these are correct: M6=420, M7=420, M9=400, M12=380.
//   NOTE: code "C7" appears twice on the original menu (藤椒鸡丁 and
//   浇汁锅巴) — kept as-is, distinguished internally by id.
// ====================================================================

const MENU=[

{code:'A1',name:'秘制东星斑烤鱼',en:'Grilled Lapulapu (1.5kg 3-4pax)',price:4500,cat:CATS[0],hot:true},
{code:'A0',name:'麻辣香锅虾',en:'Spicy Fried Shrimp Pot',price:1980,cat:CATS[0],hot:true},
{code:'A2',name:'肥肠豆腐煲',en:'Pork Intestine Tofu Stew',price:780,cat:CATS[0],hot:true},

{code:'B2',name:'水煮嫩牛',en:'Chilli Oil Beef Tenderloin',price:880,cat:CATS[0]},
{code:'B3',name:'泡椒牛肉',en:'Pickle Chilli Beef',price:580,cat:CATS[0],hot:true},
{code:'B4',name:'黑椒牛柳',en:'Black Pepper Beef Tenderloin',price:540,cat:CATS[0]},
{code:'P1',name:'肉沫茄子',en:'Minced Pork Eggplant',price:440,cat:CATS[0],hot:true},
{code:'P2',name:'五花肉炖豆角',en:'Pork Belly with Green Bean',price:640,cat:CATS[0]},
{code:'P3',name:'爆炒猪头肉',en:'Stir Fry Pork Cheek',price:680,cat:CATS[0],hot:true},
{code:'P4',name:'回锅肉',en:'Double Cooked Pork',price:520,cat:CATS[0]},
{code:'P5',name:'农家一碗香',en:'Egg and Pork with Chilli',price:500,cat:CATS[0]},
{code:'P6',name:'辣椒小炒肉',en:'Chilli Stir Fry Pork',price:450,cat:CATS[0]},
{code:'P7',name:'爆炒肥肠',en:'Stirfry Pork Large Intestine',price:680,cat:CATS[0],hot:true},
{code:'P8',name:'脆豆腐烧肉',en:'Crispy Tofu with Pork',price:400,cat:CATS[0]},

{code:'P10',name:'鲜虾腐皮卷',en:'Tofu Roll with Shrimp',price:440,cat:CATS[0]},

// ====================================================================
//   CLOUD BRIDGE — push checkout charges to the same Apps Script backend
//   index.html syncs to, so staff can pull them into a guest's bill there.
//   Best-effort only: never blocks or breaks local checkout if it fails.
// ====================================================================
function getSyncUrl(){return localStorage.getItem('rt_syncUrl')||''}
function setSyncUrl(){
  const cur=getSyncUrl()
  const url=prompt('请粘贴与前台 index.html 相同的云同步地址 (Apps Script URL)\nPaste the same cloud sync URL (Apps Script URL) configured in index.html.\n两边需用同一地址，结账后订单才能推送到账单 Both sides must use the same URL for checkout charges to sync.\n留空可取消连接 Leave blank to disconnect.',cur)
  if(url===null)return
  localStorage.setItem('rt_syncUrl',url.trim())
  updateSyncBtn()
}
function updateSyncBtn(){
  const b=document.getElementById('sync-btn');if(!b)return
  const on=!!getSyncUrl()
  b.textContent=on?'🔗 已连接 Connected':'🔗 云同步 Cloud Sync'
  b.style.background=on?'rgba(34,197,94,.35)':''
}
function pushChargeToCloud(record){
  const url=getSyncUrl();if(!url)return
  const summary=record.items.map(it=>it.name+'×'+it.qty).join('、')
  const charge={id:record.id,table:record.tableLabel,note:record.note,summary,total:record.total,date:record.paidAt.slice(0,16).replace('T',' '),claimed:false,roomCharge:!!record.roomCharge,roomNo:record.roomNo||'',instDiscount:!!record.instDiscount}
  fetch(url+'?action=load',{method:'GET',mode:'cors'}).then(r=>r.json()).then(res=>{
    if(!res||!res.ok||!Array.isArray(res.data))throw new Error('load failed')
    const data=res.data
    let rc=data.find(c=>c.id==='__restaurant_charges__')
    if(!rc){rc={id:'__restaurant_charges__',charges:[]};data.push(rc)}
    if(!Array.isArray(rc.charges))rc.charges=[]
    rc.charges.push(charge)
    return fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)})
  }).catch(()=>{/* offline or unreachable — local checkout/receipt already succeeded, just skip the push */})
}
// ---- Tableside ordering bridge: phone uploads an in-progress order, front desk pulls it in ----
// __restaurant_orders__.orders is treated as a pending queue only — front desk clears an entry
// out of it as soon as it's been pulled in, so it never grows unbounded. Re-uploading the same
// table before the desk has checked replaces (upserts by srcId) rather than duplicating, which is
// what lets a server keep adding dishes to one order instead of splitting it into multiple tickets.
function uploadOrderToFrontDesk(){
  if(!curTableId){alert('请先选择桌台 Please select a table first');return}
  const t=loadTables().find(x=>x.id===curTableId)
  if(!t||t.items.length===0){alert('该桌台还没有点菜 This table has no items yet');return}
  const url=getSyncUrl()
  if(!url){alert('请先点右上角"云同步"，填入与前台相同的地址\nPlease tap "Cloud Sync" (top right) and enter the same URL the front desk uses.');return}
  const btn=document.getElementById('upload-btn')
  if(btn){btn.disabled=true;btn.textContent='⏳ 上传中… Uploading…'}
  const order={srcId:t.id,tableLabel:t.label,note:t.note||'',items:t.items.map(i=>({id:i.id,qty:i.qty})),updatedAt:new Date().toISOString()}
  fetch(url+'?action=load',{method:'GET',mode:'cors'}).then(r=>r.json()).then(res=>{
    if(!res||!res.ok||!Array.isArray(res.data))throw new Error('load failed')
    const data=res.data
    let oq=data.find(c=>c.id==='__restaurant_orders__')
    if(!oq){oq={id:'__restaurant_orders__',orders:[]};data.push(oq)}
    if(!Array.isArray(oq.orders))oq.orders=[]
    const idx=oq.orders.findIndex(o=>o.srcId===order.srcId)
    if(idx>=0)oq.orders[idx]=order
    else oq.orders.push(order)
    return fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)})
  }).then(()=>{
    if(btn){btn.disabled=false;btn.textContent='✅ 已上传 '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
    setTimeout(()=>{if(btn)btn.textContent='📤 上传到前台 Upload to Front Desk'},3000)
  }).catch(()=>{
    if(btn){btn.disabled=false;btn.textContent='❌ 上传失败，点击重试 Failed, tap to retry'}
  })
}
// Front-desk side: pull whatever is currently queued, merge each into a matching local table
// (matched by srcId so repeated/appended uploads land on the same table instead of duplicating),
// then clear the cloud queue. One click does pull + merge + clear — no separate review step.
function checkPhoneOrders(){
  const url=getSyncUrl()
  if(!url){alert('请先点右上角"云同步"连接云端地址\nConnect Cloud Sync (top-right) first.');return}
  const btn=document.getElementById('phone-orders-btn')
  if(btn){btn.disabled=true;btn.textContent='⏳ 查询中… Checking…'}
  fetch(url+'?action=load',{method:'GET',mode:'cors'}).then(r=>r.json()).then(res=>{
    if(!res||!res.ok||!Array.isArray(res.data))throw new Error('load failed')
    const data=res.data
    const oq=data.find(c=>c.id==='__restaurant_orders__')
    const pending=(oq&&Array.isArray(oq.orders))?oq.orders:[]
    if(btn){btn.disabled=false;btn.textContent='📥 手机来单 Phone Orders'}
    pendingOrderCount=0;updatePendingBanner() // about to claim everything currently queued (or there's nothing) either way
    if(!pending.length){alert('暂无新的手机来单 No new phone orders');return}
    const tables=loadTables()
    const claimedLabels=[]
    pending.forEach(o=>{
      let tbl=tables.find(x=>x.srcId===o.srcId)
      if(!tbl){
        tbl={id:uid(),label:o.tableLabel,note:o.note||'',items:[],openedAt:new Date().toISOString(),srcId:o.srcId}
        tables.push(tbl)
      }
      tbl.items=(o.items||[]).filter(it=>MENU.some(m=>m.id===it.id)).map(it=>({id:it.id,qty:it.qty}))
      if(o.note)tbl.note=o.note
      claimedLabels.push(tbl.label)
    })
    saveTables(tables)
    renderTables();renderOrderPanel()
    oq.orders=[]
    fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)})
    alert('✅ 已接收 '+claimedLabels.length+' 张来单：'+claimedLabels.join('、'))
  }).catch(()=>{
    if(btn){btn.disabled=false;btn.textContent='📥 手机来单 Phone Orders'}
    alert('❌ 查询失败，请检查网络/云同步设置 Failed — check network/cloud sync settings')
  })
}
// ---- Auto-poll for pending phone orders ----
// Read-only GET every 10s — never POSTs, so it can run concurrently with uploads/claims
// without any risk of clobbering data. Purely an "is there something waiting?" check;
// actually claiming still goes through checkPhoneOrders() (manual button or tapping the banner).
function pollForPendingOrders(){
  const url=getSyncUrl()
  if(!url)return
  fetch(url+'?action=load',{method:'GET',mode:'cors'}).then(r=>r.json()).then(res=>{
    if(!res||!res.ok||!Array.isArray(res.data))return
    const oq=res.data.find(c=>c.id==='__restaurant_orders__')
    const n=(oq&&Array.isArray(oq.orders))?oq.orders.length:0
    if(n>pendingOrderCount)beepAlert()
    pendingOrderCount=n
    updatePendingBanner()
  }).catch(()=>{/* network hiccup — silently retry on next interval, don't nag the user */})
}
function updatePendingBanner(){
  const b=document.getElementById('pending-banner')
  if(!b)return
  if(pendingOrderCount>0){
    document.getElementById('pending-banner-text').textContent='📥 '+pendingOrderCount+' 张新来单待处理 New phone order(s) waiting'
    b.style.display='flex'
  }else{
    b.style.display='none'
  }
}
function beepAlert(){
  if(!audioCtx)return // no user gesture yet this session — banner still shows visually
  try{playTone(880,0,.35);playTone(1100,.22,.35)}catch(e){}
}
function playTone(freq,delay,dur){
  const t0=audioCtx.currentTime+delay
  const o=audioCtx.createOscillator(),g=audioCtx.createGain()
  o.type='sine';o.frequency.value=freq
  o.connect(g);g.connect(audioCtx.destination)
  g.gain.setValueAtTime(.0001,t0)
  g.gain.exponentialRampToValueAtTime(.3,t0+.01)
  g.gain.exponentialRampToValueAtTime(.0001,t0+dur)
  o.start(t0);o.stop(t0+dur+.05)
}
function fmt(n){return'₱'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function ensureDefaultTables(){
  let t=loadTables()
  if(t.length===0){
    t=[1,2,3,4,5,6].map(n=>({id:uid(),label:n+'号桌',note:'',items:[],openedAt:new Date().toISOString()}))
    saveTables(t)
  }
  return t
}

function renderTables(){
  const tables=loadTables()
  const el=document.getElementById('tables-list')
  el.innerHTML=tables.map(t=>{
    const total=orderTotal(t)
    const hasOrder=t.items.length>0
    const cls='table-tile'+(t.id===curTableId?' active':'')+(hasOrder?' has-order':'')
    return '<div class="'+cls+'" onclick="selectTable(\''+t.id+'\')">'
      +'<button class="t-del" onclick="event.stopPropagation();removeTable(\''+t.id+'\')" title="删除桌台 Delete Table">✕</button>'
      +'<div class="t-name">'+(t.srcId?'📱 ':'')+esc(t.label)+'</div>'
      +(t.note?'<div class="t-note">'+esc(t.note)+'</div>':'')
      +'<div class="t-meta"><span>'+t.items.reduce((s,i)=>s+i.qty,0)+' 件 items</span><span>'+fmt(total)+'</span></div>'
      +'</div>'
  }).join('')||'<div class="order-empty">暂无桌台，点击"＋开台"新建 No tables yet — click "+ New Table" to add one</div>'
}
function orderTotal(t){return t.items.reduce((s,it)=>{const m=MENU.find(x=>x.id===it.id);return s+(m?getPrice(m):0)*it.qty},0)}

  const t=loadTables()
  const nt={id:uid(),label,note,items:[],openedAt:new Date().toISOString()}
  t.push(nt)

  selectTable(nt.id)

function removeTable(id){
  const t=loadTables()
  const tbl=t.find(x=>x.id===id)
  if(tbl&&tbl.items.length>0){if(!confirm('该桌台还有未结账的订单，确定删除吗？This table still has an unpaid order. Delete anyway?'))return}
  const nt=t.filter(x=>x.id!==id)
  saveTables(nt)
  if(curTableId===id)curTableId=null
  renderTables();renderOrderPanel()
}

  const label=document.getElementById('et-label').value.trim()
  const note=document.getElementById('et-note').value.trim()
  if(!label){alert('请输入桌号/名称 Please enter a table name/number');return}
  const t=loadTables()
  const tbl=t.find(x=>x.id===curTableId)
  if(tbl){tbl.label=label;tbl.note=note;saveTables(t)}
  closeModal('edit-table-modal')
  renderTables();renderOrderPanel()
}
function closeModal(id){document.getElementById(id).classList.remove('show')}

// ====================================================================
//   MENU
// ====================================================================
function renderCatTabs(){
  const el=document.getElementById('cat-tabs')
  const all=[{label:'全部 All',val:'ALL'}].concat(CATS.map(c=>({label:c,val:c})))
  el.innerHTML=all.map(c=>'<div class="cat-tab'+(curCat===c.val?' active':'')+'" onclick="setCat(\''+c.val+'\')">'+esc(c.label)+'</div>').join('')
}
function setCat(c){curCat=c;renderCatTabs();renderMenu()}
function renderMenu(){
  const search=(document.getElementById('search-input').value||'').trim().toLowerCase()
  let items=MENU
  if(curCat!=='ALL')items=items.filter(m=>m.cat===curCat)
  if(search)items=items.filter(m=>m.code.toLowerCase().includes(search)||m.name.toLowerCase().includes(search)||m.en.toLowerCase().includes(search))
  const el=document.getElementById('menu-grid')
  el.innerHTML=items.map(m=>{
    const price=getPrice(m)
    return '<div class="item-card" onclick="addItemToOrder(\''+m.id+'\')">'
      +(m.hot?'<span class="ic-hot">👍</span>':'')
      +'<div class="ic-code">'+esc(m.code)+'</div>'
      +'<div class="ic-name">'+esc(m.name)+'</div>'
      +'<div class="ic-en">'+esc(m.en)+'</div>'
      +'<div class="ic-price">'+fmt(price)+'</div>'
      +'</div>'
  }).join('')||'<div class="order-empty">没有找到匹配的菜品 No matching dishes found</div>'
}

// ====================================================================
//   ORDER (per table)
// ====================================================================
function addItemToOrder(itemId){
  if(!curTableId){alert('请先选择或开一个桌台 Please select or open a table first');return}
  const t=loadTables()
  const tbl=t.find(x=>x.id===curTableId)
  if(!tbl)return
  const line=tbl.items.find(i=>i.id===itemId)
  if(line)line.qty++
  else tbl.items.push({id:itemId,qty:1})
  saveTables(t)
  renderOrderPanel();renderTables()
}
function changeQty(itemId,delta){
  const t=loadTables()
  const tbl=t.find(x=>x.id===curTableId)
  if(!tbl)return
  const line=tbl.items.find(i=>i.id===itemId)
  if(!line)return
  line.qty+=delta
  if(line.qty<=0)tbl.items=tbl.items.filter(i=>i.id!==itemId)
  saveTables(t)
  renderOrderPanel();renderTables()
}
function removeOrderItem(itemId){
  const t=loadTables()
  const tbl=t.find(x=>x.id===curTableId)
  if(!tbl)return
  tbl.items=tbl.items.filter(i=>i.id!==itemId)
  saveTables(t)
  renderOrderPanel();renderTables()
}
function clearOrder(){
  if(!curTableId)return
  const t=loadTables()
  const tbl=t.find(x=>x.id===curTableId)
  if(!tbl||tbl.items.length===0)return
  if(!confirm('确定清空该桌台的订单吗？（不会生成流水记录）Clear this table\'s order? (No sales record will be created)'))return
  tbl.items=[]
  saveTables(t)
  renderOrderPanel();renderTables()
}
function renderOrderPanel(){
  const nameEl=document.getElementById('order-table-name')
  const linesEl=document.getElementById('order-lines')
  const totalEl=document.getElementById('order-total-amt')
  if(!curTableId){
    nameEl.innerHTML='<div class="tn-label" style="color:#94a3b8">未选择桌台 No table selected</div>'
    linesEl.innerHTML='<div class="order-empty">从左侧选择或新开一个桌台 Select or open a table from the left</div>'
    totalEl.textContent=fmt(0)
    updateMobileOrderBadge()
    return
  }
  const t=loadTables().find(x=>x.id===curTableId)
  if(!t){curTableId=null;renderOrderPanel();return}
  nameEl.innerHTML='<span class="tn-label">'+esc(t.label)+'</span><span class="tn-edit" onclick="openEditTableModal()">✏️ 编辑 Edit</span>'
    +(t.note?'<div class="tn-note">'+esc(t.note)+'</div>':'')
  if(t.items.length===0){
    linesEl.innerHTML='<div class="order-empty">还没有点菜<br>从中间菜单点击菜品添加 No items yet<br>Click a dish from the menu to add</div>'
  }else{
    linesEl.innerHTML=t.items.map(line=>{
      const m=MENU.find(x=>x.id===line.id)
      if(!m)return''
      const price=getPrice(m)
      return '<div class="order-line">'
        +'<div class="ol-info"><div class="ol-name">'+esc(m.code)+' '+esc(m.name)+'</div><div class="ol-en">'+esc(m.en)+'</div><div class="ol-price">'+fmt(price)+' / 份 each</div></div>'
        +'<div class="ol-qty"><button onclick="changeQty(\''+m.id+'\',-1)">－</button><span>'+line.qty+'</span><button onclick="changeQty(\''+m.id+'\',1)">＋</button></div>'
        +'<div class="ol-sub">'+fmt(price*line.qty)+'</div>'
        +'<span class="ol-del" onclick="removeOrderItem(\''+m.id+'\')">✕</span>'
        +'</div>'
    }).join('')
  }
  totalEl.textContent=fmt(orderTotal(t))
  updateMobileOrderBadge()
}

// ====================================================================
//   CHECKOUT + RECEIPT PRINT
// ====================================================================
let coTableId=null,coRoomCharge=false,coInstDiscount=false
function checkoutTable(){
  if(!curTableId)return
  const t=loadTables().find(x=>x.id===curTableId)
  if(!t||t.items.length===0){alert('该桌台没有订单 This table has no order');return}
  coTableId=curTableId
  document.getElementById('co-table-label').textContent=t.label+(t.note?' · '+t.note:'')
  document.getElementById('co-room-no').value=''
  coInstDiscount=false
  document.getElementById('co-inst-disc').checked=false
  refreshCheckoutTotals()
  setCheckoutRoomCharge(false)
  document.getElementById('checkout-modal').classList.add('show')
}
// Instructor discount toggle (-10% off the subtotal, applied at checkout for staff/instructors
// paying for their own meal directly — separate from the existing claim-to-guest-bill discount
// in index.html, which applies when a guest's restaurant charges are later added to their folio).
function toggleInstDiscount(checked){coInstDiscount=checked;refreshCheckoutTotals()}
function refreshCheckoutTotals(){
  const t=loadTables().find(x=>x.id===coTableId);if(!t)return
  const sub=orderTotal(t)
  const disc=coInstDiscount?sub*0.1:0
  document.getElementById('co-subtotal').textContent=fmt(sub)
  const row=document.getElementById('co-disc-row')
  if(disc>0){row.style.display='flex';document.getElementById('co-disc-amt').textContent='－'+fmt(disc)}
  else row.style.display='none'
  document.getElementById('co-total').textContent=fmt(sub-disc)
}
function setCheckoutRoomCharge(isRoom){
  coRoomCharge=isRoom
  document.getElementById('co-btn-cash').className='btn '+(isRoom?'btn-ghost':'btn-primary')
  document.getElementById('co-btn-room').className='btn '+(isRoom?'btn-primary':'btn-ghost')
  document.getElementById('co-room-no-wrap').style.display=isRoom?'block':'none'
  if(isRoom)setTimeout(()=>document.getElementById('co-room-no').focus(),50)
}
function confirmCheckout(){
  const t=loadTables().find(x=>x.id===coTableId)
  if(!t){closeModal('checkout-modal');return}
  let roomNo=''
  if(coRoomCharge){
    roomNo=document.getElementById('co-room-no').value.trim()
    if(!roomNo){alert('请输入房号 Please enter the room number');return}
  }
  const subtotal=orderTotal(t)
  const discountAmt=coInstDiscount?subtotal*0.1:0
  const total=subtotal-discountAmt

  const now=new Date()
  const lines=t.items.map(line=>{
    const m=MENU.find(x=>x.id===line.id)
    const price=m?getPrice(m):0
    return{code:m?m.code:'',name:m?m.name:'',en:m?m.en:'',qty:line.qty,price,sub:price*line.qty}
  })
  const record={id:uid(),tableLabel:t.label,note:t.note,items:lines,subtotal,instDiscount:coInstDiscount,discountAmt,total,paidAt:now.toISOString(),roomCharge:coRoomCharge,roomNo}
  const hist=loadHistory()
  hist.push(record)
  saveHistory(hist)
  pushChargeToCloud(record)

  buildReceipt(record,now)
  closeModal('checkout-modal')

  // reset table for next customer
  const tables=loadTables()
  const tbl=tables.find(x=>x.id===coTableId)
  if(tbl){tbl.items=[];tbl.note=''}
  saveTables(tables)
  renderOrderPanel();renderTables()

  setTimeout(()=>window.print(),150)
}
function buildReceipt(record,now){
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
  let html='<div class="r-title">Lucky Tito Restaurant</div>'
    +'<div class="r-sub">'+esc(record.tableLabel)+(record.note?' · '+esc(record.note):'')+'</div>'
    +'<div class="r-sub">'+dateStr+'</div>'
    +'<hr>'
  record.items.forEach(it=>{
    html+='<div class="r-line"><div class="rl-name">'+esc(it.code)+' '+esc(it.name)+'</div>'
      +(it.en?'<div class="rl-en">'+esc(it.en)+'</div>':'')
      +'<div class="rl-qp"><span>x'+it.qty+'</span><span>'+fmt(it.sub)+'</span></div></div>'
  })
  html+='<hr>'
  if(record.discountAmt>0){
    html+='<div class="r-line"><div class="rl-qp"><span>Subtotal</span><span>'+fmt(record.subtotal)+'</span></div></div>'
    html+='<div class="r-line"><div class="rl-qp"><span>Inst. Discount -10%</span><span>－'+fmt(record.discountAmt)+'</span></div></div>'
  }
  html+='<div class="r-total"><span>Total</span><span>'+fmt(record.total)+'</span></div>'
  html+=record.roomCharge
    ?'<div class="r-pay">ROOM CHARGE 房间挂账 · Room '+esc(record.roomNo)+'</div>'
    :'<div class="r-pay">CASH / CARD 现金/卡</div>'
  html+='<div class="r-sign"><div class="r-sign-line"></div><div class="r-sign-label">Guest Signature 客人签名</div></div>'
    +'<div class="r-foot">谢谢光临 Thank you</div>'
  document.getElementById('receipt-print').innerHTML=html
}

// ====================================================================
//   KITCHEN TICKET (English-only print for kitchen staff)
// ====================================================================
function buildKitchenTicket(t){
  const now=new Date()
  const dateStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')
  let html='<div class="k-title">KITCHEN ORDER</div>'
    +'<div class="k-sub">Table: '+esc(t.label)+(t.note?' - '+esc(t.note):'')+'</div>'
    +'<div class="k-sub">'+dateStr+'</div>'
    +'<hr>'
  t.items.forEach(line=>{
    const m=MENU.find(x=>x.id===line.id)
    if(!m)return
    html+='<div class="k-line"><span class="kl-code">'+esc(m.code)+'</span><span class="kl-name">'+esc(m.en)+'</span><span class="kl-qty">x'+line.qty+'</span></div>'
  })
  document.getElementById('kitchen-print').innerHTML=html
}
function printKitchenTicket(){
  if(!curTableId){alert('请先选择桌台 Please select a table first');return}
  const t=loadTables().find(x=>x.id===curTableId)
  if(!t||t.items.length===0){alert('该桌台没有订单 This table has no order');return}
  buildKitchenTicket(t)
  document.body.classList.add('print-kitchen')
  setTimeout(()=>window.print(),100)
}
window.addEventListener('afterprint',()=>document.body.classList.remove('print-kitchen'))

// ====================================================================
//   HISTORY (today's sales)
// ====================================================================
function showHistory(){
  const hist=loadHistory()
  const today=new Date().toISOString().split('T')[0]
  const todays=hist.filter(h=>h.paidAt.startsWith(today)).sort((a,b)=>b.paidAt.localeCompare(a.paidAt))
  const total=todays.reduce((s,h)=>s+h.total,0)
  document.getElementById('hist-date').textContent=today+' 共 '+todays.length+' 单 ('+todays.length+' orders)'
  document.getElementById('hist-total').textContent=fmt(total)
  document.getElementById('hist-list').innerHTML=todays.map(h=>{
    const time=h.paidAt.slice(11,16)
    return '<div class="hist-row"><div><div>'+esc(h.tableLabel)+(h.note?' · '+esc(h.note):'')+(h.roomCharge?' · 🛏️ Room '+esc(h.roomNo):'')+(h.instDiscount?' · 🎓 -10%':'')+'</div><div class="h-meta">'+time+' · '+h.items.length+' 项 items</div></div><div>'+fmt(h.total)+'</div></div>'
  }).join('')||'<div class="order-empty">今天还没有结账记录 No checkouts yet today</div>'
  document.getElementById('history-modal').classList.add('show')
}

// ====================================================================
//   INIT
// ====================================================================
function tickClock(){
  const n=new Date()
  document.getElementById('clock').textContent=n.toLocaleDateString('zh-CN')+' '+n.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})
}
function init(){
  ensureDefaultTables()
  renderCatTabs()
  renderTables()
  renderMenu()
  renderOrderPanel()
  updateSyncBtn()
  setMobileView('tables')
  tickClock()
  setInterval(tickClock,30000)
  pollForPendingOrders()
  setInterval(pollForPendingOrders,10000)
}
init()
</script>
